<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap Jumbotron Project</title>

  <!-- Bootstrap 4 CDN (Important for Jumbotron) -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>

<body>

  <!-- Full Width Jumbotron -->
  <div class="jumbotron text-center bg-primary text-white">
    <h1>Welcome to My Website</h1>
    <p>This is a full-width jumbotron</p>
    <button class="btn btn-light">Learn More</button>
  </div>

  <!-- Inside Container -->
  <div class="container">
    <div class="jumbotron">
      <h2>Inside Container</h2>
      <p>This jumbotron is centered.</p>
    </div>
  </div>

  <!-- Fluid Jumbotron -->
  <div class="jumbotron jumbotron-fluid bg-dark text-white">
    <div class="container">
      <h1>Fluid Jumbotron</h1>
      <p>Full width without rounded corners</p>
    </div>
  </div>

  <!-- Cards Section (Real UI Example) -->
  <div class="container mt-4">
    <h3 class="text-center">Our Services</h3>

    <div class="row mt-3">
      <div class="col-md-4">
        <div class="jumbotron bg-success text-white">
          <h4>Design</h4>
          <p>UI/UX Design Services</p>
        </div>
      </div>

      <div class="col-md-4">
        <div class="jumbotron bg-warning">
          <h4>Development</h4>
          <p>Web Development</p>
        </div>
      </div>

      <div class="col-md-4">
        <div class="jumbotron bg-danger text-white">
          <h4>Marketing</h4>
          <p>Digital Marketing</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="jumbotron text-center bg-secondary text-white mt-4">
    <p>Footer Section</p>
  </div>

</body>
</html>
